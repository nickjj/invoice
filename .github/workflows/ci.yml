name: "CI"

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"

jobs:
  test:
    runs-on: "ubuntu-24.04"

    steps:
      - uses: "actions/checkout@v4"

      - name: "Install CI dependencies"
        run: |
          sudo apt-get install -y shellcheck

      - name: "Lint and test"
        run: |
          shellcheck invoice

          cd tests
          shellcheck +x tests
          ./tests
